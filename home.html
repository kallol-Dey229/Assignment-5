<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issue tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind + DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="bg-[#f3f3f5]">

    <!-- navbar -->

    <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1 flex space-x-6">
    <img class="ml-5 w-[40px]" src="./assets/github-logo.png" alt="">
    <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
  </div>
</div>


<!-- choose section -->

<div class="mx-auto bg-white mt-14 p-5 w-9/12 rounded-md space-x-2">
    <button class="btn btn-primary btn-outline">All</button>
    <button class="btn btn-primary btn-outline">Open</button>
    <button class="btn btn-primary btn-outline">Closed</button>
</div>



<!-- card count -->

<div class="mx-auto bg-white p-5 w-9/12 mt-2 rounded-sm flex justify-between">
    <div class="left flex gap-3">
        <div class="img h-10 w-10 p-1 rounded-full bg-blue-100">
            <img src="./assets/Aperture.png" alt="">
        </div>

        <div class="img-text">
            <h2 class="text-xl font-bold">50 Issues</h2>
            <p class="text-gray-500">Track and manage your project issues</p>
        </div>

    </div>

    <div class="right flex gap-6">
        <div class="open flex gap-2">
            <div class="flex text-center items-center"><img src="./assets/Ellipse 2 (1).png" alt=""></div>
            <div class="flex text-center items-center font-semibold">Open</div>
        </div>
        <div class="close flex gap-2">
            <div class="flex text-center items-center"><img src="./assets/Ellipse 2.png" alt=""></div>
            <div class="flex text-center items-center font-semibold">Closed</div>
        </div>
    </div>
</div>








<!-- card section -->

<section id="card-conatiner" class="mx-auto bg-white mt-1 p-5 w-9/12 grid grid-cols-4 gap-3">
    <div class="card bg-white shadow-sm space-y-6 p-5">
        <div class="card-header flex justify-between">
            <img class="" src="./assets/Open-Status.png" alt="">
            <button class="btn btn-error btn-soft rounded-full px-7 py-0">High</button>
        </div>
        <div class="card-text space-y-2">
            <h2 class="text-xl font-bold">Fix navigation menu on mobile devices</h2>
            <p class="text-gray-600">The navigation menu doesn't collapse properly on mobile devices...</p>
        </div>

        <div class="bug-help-btn">
            <button class="btn btn-error btn-outline rounded-full">BUG</button>
            <button class="btn btn-outline btn-warning rounded-full">HELP WANTED</button>

        </div>
        <hr class="bg-gray-300">
        <div class="card-bottom space-y-2">
            <p class="text-gray-600">#1 by john_doe</p>
            <p class="text-gray-600">1/15/2024</p>
        </div>
    </div>
    
</section>
    
</body>
</html>
