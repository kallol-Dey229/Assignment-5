<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issue tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind + DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="bg-[#f3f3f5]">

    <!-- navbar -->

    <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1 flex space-x-6">
    <img class="ml-5 w-[40px]" src="./assets/github-logo.png" alt="">
    <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <div class="flex justify-center">
    <div class="join">
  <div>
    <label class="input validator join-item">
      <input id="input-search" type="text" placeholder="Search issues..." required />
    </label>

  </div>
  <button id="btn-search" class="btn btn-primary join-item">Search</button>
</div>
</div>
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
  </div>
</div>


<!-- choose section -->

<div class="mx-auto bg-white mt-14 p-5 w-9/12 rounded-md space-x-2">
    <button onclick="toggleStyle('all-btn')" id="all-btn" class="btn btn-primary btn-outline">All</button>
    <button onclick="toggleStyle('open-btn')" id="open-btn" class="btn btn-primary btn-outline">Open</button>
    <button onclick="toggleStyle('closed-btn')" id="closed-btn" class="btn btn-primary btn-outline">Closed</button>
</div>



<!-- card count -->

<div class="mx-auto bg-white p-5 w-9/12 mt-2 rounded-sm flex justify-between">
    <div class="left flex gap-3">
        <div class="img h-10 w-10 p-1 rounded-full bg-blue-100">
            <img src="./assets/Aperture.png" alt="">
        </div>

        <div class="img-text">
            <h2 id="issue-count" class="text-xl font-bold">50 Issues</h2>
            <p class="text-gray-500">Track and manage your project issues</p>
        </div>

    </div>

    <div class="right flex gap-6">
        <div class="open flex gap-2">
            <div class="flex text-center items-center"><img src="./assets/Ellipse 2 (1).png" alt=""></div>
            <div class="flex text-center items-center font-semibold">Open</div>
        </div>
        <div class="close flex gap-2">
            <div class="flex text-center items-center"><img src="./assets/Ellipse 2.png" alt=""></div>
            <div class="flex text-center items-center font-semibold">Closed</div>
        </div>
    </div>
</div>








<!-- card section -->

<section id="issue-container" class="mx-auto bg-white mt-1 p-5 w-9/12 grid grid-cols-1 gap-3 sm:grid-cols-2 md:grid-cols-4">
    
</section>






<!-- Details card -->







<!--  -->


<dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box w-11/12 max-w-2xl">
    <div id="details-container" class="space-y-5">

        
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

















    

<script src="./script/home.js"></script>
</body>
</html>
